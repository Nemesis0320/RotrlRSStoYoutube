name: Test Circular Waveform
on:
  push:
    branches:
      - elliptical-waveform-v3
  workflow_dispatch:

jobs:
  test-render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      # NEW: Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install numpy Pillow
          
      - name: Run test render script
        run: python3 test_render_elliptical.py
        
      - name: Upload test video
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-circular-waveform
          path: test_output.mp4
          if-no-files-found: warn
