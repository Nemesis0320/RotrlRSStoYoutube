name: Test Elliptical Remap

on:
  workflow_dispatch:

jobs:
  test-ellipse-remap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install pillow numpy

      - name: Generate remap image
        run: python3 scripts/generate_ellipse_remap.py

      - name: Download test audio
        run: |
          mkdir -p assets
          curl -L -o assets/test_audio.mp3 "https://quicksounds.com/uploads/tracks/528054973_948104858_1761723949.mp3"

      - name: Generate linear waveform (raw, 12 FPS)
        run: |
          ffmpeg -y -i assets/test_audio.mp3 \
            -filter_complex "[0:a]showwaves=s=1200x5:mode=p2p:colors=white:scale=lin*8:rate=12,format=gray[wave]" \
            -map "[wave]" -c:v rawvideo -pix_fmt gray wave_linear.yuv

      - name: Warp waveform with remap and overlay on emblem
        run: |
          ffmpeg -y \
            -f rawvideo -pix_fmt gray -s 1200x5 -r 12 -i wave_linear.yuv \
            -loop 1 -i ellipse_remap.ppm \
            -loop 1 -i assets/1200x1200bf.webp \
            -filter_complex "[0:v]format=gray,format=rgba,colorchannelmixer=1:1:1:0[wave_rgba];[wave_rgba][1:v]remap[warped];[warped]format=rgba,colorchannelmixer=1:0.84:0:0[goldc];[2:v][goldc]overlay=0:0" \
            -c:v mjpeg -q:v 3 -c:a aac -shortest output_test.avi

      - name: Upload test video artifact
        uses: actions/upload-artifact@v4
        with:
          name: elliptical-remap-test-output
          path: output_test.avi
