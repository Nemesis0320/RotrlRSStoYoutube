name: Test Circular Waveform

on:
  workflow_dispatch:
  push:
    branches:
      - circular-waveform
  pull_request:
    branches:
      - circular-waveform

jobs:
  test-waveform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Install Python dependencies
        run: pip install pillow numpy

      - name: Make test script executable
        run: chmod +x scripts/test_circular_waveform.sh

      - name: Generate elliptical mask
        run: bash scripts/generate_mask.sh

      - name: Run waveform test
        run: ./scripts/test_circular_waveform.sh

      - name: Generate linear waveform
        run: |
          ffmpeg -i assets/test_audio.mp3 \
            -filter_complex "showwaves=s=1200x80:mode=p2p:colors=white:scale=lin*8" \
            -frames:v 1 -update 1 wave_linear.png

      - name: DEBUG — list everything
        run: |
          pwd
          ls -R .

      - name: Warp waveform into circular ring
        run: python3 scripts/warp_waveform.py

      - name: Composite emblem + circular waveform
        run: |
          ffmpeg -y -i assets/1200x1200bf.webp -i wave_circle.png \
            -filter_complex "[0][1]overlay=0:0" \
            output_test.mp4

      - name: Upload test video artifact
        uses: actions/upload-artifact@v4
        with:
          name: circular-waveform-test-output
          path: output_test.mp4
