name: Test Elliptical Waveform

on:
  workflow_dispatch:
  push:
    branches:
      - circular-waveform
  pull_request:
    branches:
      - circular-waveform

jobs:
  test-waveform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install pillow numpy

      - name: Generate linear waveform
        run: |
          ffmpeg -y -i assets/test_audio.mp3 \
            -filter_complex "showwaves=s=1200x5:mode=p2p:colors=white:scale=lin*8" \
            -frames:v 1 -update 1 wave_linear.png

      - name: Warp waveform into elliptical ring
        run: python3 scripts/warp_waveform.py

      - name: Composite emblem + elliptical waveform
        run: |
          ffmpeg -y -loop 1 -i assets/1200x1200bf.webp -i wave_circle.png \
            -filter_complex "[0][1]overlay=0:0" \
            -c:v libx264 -preset veryfast -crf 18 \
            -shortest output_test.mp4

      - name: Upload test video artifact
        uses: actions/upload-artifact@v4
        with:
          name: elliptical-waveform-test-output
          path: output_test.mp4
