name: Upload Podcast Episodes

on:
  workflow_dispatch:   # Manual trigger only

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      # DECODE THE BASE64 SECRET INTO token.json
      - name: Add YouTube credentials
        run: echo "${{ secrets.YOUTUBE_TOKEN_JSON_B64 }}" | base64 --decode > token.json

      - name: Run uploader
        env:
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
        run: python3 uploader.py

      - name: Commit uploaded.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add uploaded.json
          git commit -m "Update uploaded episodes" || echo "No changes"
          git push
